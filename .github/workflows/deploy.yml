name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Build server
        run: cd server && npm run build

      - name: Build admin
        run: cd admin && npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="/var/www/wordy/releases/$TIMESTAMP"
          SSH_CMD="ssh -i ~/.ssh/deploy_key root@$SSH_HOST"

          # Create release directory
          $SSH_CMD "mkdir -p $RELEASE_DIR"

          # Sync built files to server
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            ./ root@$SSH_HOST:$RELEASE_DIR/

          # Run deployment script on server
          $SSH_CMD "bash /var/www/wordy/releases/$TIMESTAMP/deploy.sh $TIMESTAMP"
